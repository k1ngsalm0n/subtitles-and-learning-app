<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning with subtitles</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #0a0a0b;
  --surface: #141416;
  --surface-2: #1c1c20;
  --surface-3: #26262b;
  --text: #e8e6e1;
  --muted: #8a8a94;
  --border: #2a2a30;
  --accent: #6ee7b7;
  --accent-2: #fbbf24;
  --danger: #f87171;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 12px;
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: #fafaf9;
  --surface: #ffffff;
  --surface-2: #f3f3f0;
  --surface-3: #e7e5e0;
  --text: #1a1a1a;
  --muted: #6b6b73;
  --border: #e0ddd6;
  --accent: #059669;
  --accent-2: #d97706;
  --danger: #dc2626;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
  font-size: 14px;
}
button, input, textarea { font: inherit; }
button, .file-button {
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  padding: 0 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  transition: all 0.15s;
}
button:hover, .file-button:hover { border-color: var(--accent); background: var(--surface-3); }
button.active, .segmented button.active { background: var(--accent); color: #000; border-color: transparent; font-weight: 600; }
input, textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  padding: 8px 12px;
  outline: none;
  font-size: 13px;
}
input:focus, textarea:focus { border-color: var(--accent); }

/* Top navigation bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 8px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--accent);
  color: #000;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 16px;
}
.brand h1 { font-size: 16px; font-weight: 700; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  border: none;
  background: transparent;
  color: var(--muted);
  font-weight: 500;
  border-radius: 6px;
  padding: 6px 14px;
  height: 32px;
  font-size: 13px;
}
.nav-tab.active { background: var(--surface-2); color: var(--text); }
.nav-tab:hover { color: var(--text); }
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--muted);
  background: var(--surface-2);
  border-radius: 20px;
  padding: 4px 10px;
}
.stat-pill strong { color: var(--text); font-size: 13px; }
.segmented {
  display: flex;
  gap: 2px;
  padding: 3px;
  background: var(--surface-2);
  border-radius: 8px;
}
.segmented button { height: 28px; min-height: 28px; border: none; border-radius: 6px; font-size: 12px; }
#themeToggle { width: 36px; padding: 0; border: none; background: transparent; font-size: 18px; }

/* Main content */
main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* Study view — video left, transcript right */
.workspace {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
}
.media-pane {
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
/* The shell owns the layout slot: 16:9, but never taller than what leaves the
   karaoke stage visible below it (topbar + paddings + stage ≈ 300px). The
   player-wrap fills the shell, and detaches from it in mini mode. */
.player-shell {
  position: relative;
  aspect-ratio: 16/9;
  max-height: calc(100vh - 300px);
  max-height: calc(100dvh - 300px);
  min-height: 200px;
  background: #000;
}
.player-wrap {
  position: absolute;
  inset: 0;
  background: #000;
}
.player-shell.detached::after {
  content: "Playing in the mini player";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-size: 13px;
}
/* Floating mini player: fixed, draggable, positioned via left/top from JS. */
.player-wrap.mini {
  position: fixed;
  inset: auto;
  width: clamp(240px, 38vw, 420px);
  height: auto;
  aspect-ratio: 16/9;
  z-index: 60;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
}
.mini-drag {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 30px;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  z-index: 2;
  cursor: grab;
  user-select: none;
  touch-action: none;
  background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0));
  color: #fff;
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.15s;
}
.player-wrap.mini .mini-drag { display: flex; }
/* In mini mode the whole video body drags, except the bottom strip where the
   native controls (seek bar, play button) live. A plain click — no movement —
   passes through as play/pause via JS. */
.mini-drag-surface {
  display: none;
  position: absolute;
  inset: 0 0 48px 0;
  z-index: 1;
  cursor: grab;
  touch-action: none;
}
.player-wrap.mini .mini-drag-surface { display: block; }
.mini-drag-surface:active { cursor: grabbing; }
.player-wrap.mini:hover .mini-drag { opacity: 1; }
.mini-drag:active { cursor: grabbing; }
#miniExpand {
  height: 22px;
  min-height: 22px;
  padding: 0 8px;
  font-size: 13px;
  border: none;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
}
/* Resize handles: invisible hit zones just inside each corner and edge
   (inside, because the mini player clips overflow for its rounded corners).
   Active only in mini mode; aspect stays 16:9, so width drives height. */
.mini-rz { display: none; position: absolute; z-index: 3; touch-action: none; }
.player-wrap.mini .mini-rz { display: block; }
.mini-rz[data-dir="n"] { top: 0; left: 14px; right: 14px; height: 7px; cursor: ns-resize; }
.mini-rz[data-dir="s"] { bottom: 0; left: 14px; right: 14px; height: 7px; cursor: ns-resize; }
.mini-rz[data-dir="e"] { right: 0; top: 14px; bottom: 14px; width: 7px; cursor: ew-resize; }
.mini-rz[data-dir="w"] { left: 0; top: 14px; bottom: 14px; width: 7px; cursor: ew-resize; }
.mini-rz[data-dir="nw"] { top: 0; left: 0; width: 14px; height: 14px; cursor: nwse-resize; }
.mini-rz[data-dir="se"] { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
.mini-rz[data-dir="ne"] { top: 0; right: 0; width: 14px; height: 14px; cursor: nesw-resize; }
.mini-rz[data-dir="sw"] { bottom: 0; left: 0; width: 14px; height: 14px; cursor: nesw-resize; }
video { width: 100%; height: 100%; display: block; object-fit: contain; }
.empty-player {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--muted);
  padding: 24px;
}
.empty-player.hidden { display: none; }
.import-bar, .url-row, .toolbar-row, .manual-card, .card-actions {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.url-row input, .search-box { flex: 1 1 180px; }
.source-status { flex: 1 1 100%; color: var(--muted); min-height: 18px; font-size: 13px; }
.progress-wrap { flex: 1 1 100%; display: none; }
.progress-wrap.visible { display: block; }
.progress-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--surface-3);
  overflow: hidden;
  margin-top: 6px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  width: 0%;
  transition: width 0.4s ease;
}
.progress-bar-fill.indeterminate {
  width: 40%;
  animation: indeterminate 1.4s ease-in-out infinite;
}
@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  50% { transform: translateX(180%); }
  100% { transform: translateX(-100%); }
}
.file-button input { display: none; }

/* Subtitle display — large, centered above transcript */
.learning-pane {
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  min-width: 0;
}
/* The transcript is its own, wider container below the player/stage. */
.transcript-pane {
  max-width: 1500px;
  margin: 20px auto 0;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
}

/* Google-Translate-style language picker above the subtitle stage */
.translate-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--surface-2);
  flex-wrap: wrap;
}
.translate-langs {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1 1 auto;
}
.translate-field {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  flex: 1 1 0;
  min-width: 0;
}
.translate-field span { white-space: nowrap; }
.translate-field select {
  width: 100%;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  padding: 0 8px;
  font-size: 13px;
  cursor: pointer;
}
.translate-field select:focus { border-color: var(--accent); outline: none; }
#swapLangs { flex: 0 0 auto; font-size: 16px; }
#translateButton { flex: 0 0 auto; }
.translate-status {
  flex: 1 1 100%;
  color: var(--muted);
  font-size: 12px;
  min-height: 16px;
}
.subtitle-stage {
  padding: 20px 24px;
  display: grid;
  gap: 8px;
  align-content: center;
  min-height: 120px;
  background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%);
  border-top: 1px solid var(--border);
}
.active-original {
  font-size: clamp(20px, 2.5vw, 36px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.active-translation { color: var(--accent-2); font-size: 16px; line-height: 1.4; }
.stage-word {
  padding: 4px 8px;
  border-radius: 8px;
  transition: background 0.1s, box-shadow 0.1s;
}
.stage-word.spoken {
  background: rgba(110, 231, 183, 0.25);
  box-shadow: 0 0 0 2.5px var(--accent);
}
:root[data-theme="light"] .stage-word.spoken {
  background: rgba(5, 150, 105, 0.15);
  box-shadow: 0 0 0 2.5px var(--accent);
}
.transcript { overflow-y: auto; padding: 8px; max-height: 70vh; }
.line {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.1s;
}
.line:hover { background: var(--surface-2); }
.line.active { background: var(--surface-2); border-left: 3px solid var(--accent); }
.time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 16px; padding-top: 2px; }
.original { line-height: 2.1; font-size: 38px; }
.word {
  padding: 2px 3px;
  border-radius: 4px;
  cursor: pointer;
}
.word:hover { background: rgba(110,231,183,0.15); }
.translation { margin-top: 8px; line-height: 1.5; color: var(--muted); font-size: 20px; }
/* Pronunciation stacked over each character (ruby/furigana). */
ruby { ruby-position: over; ruby-align: center; }
rt {
  font-size: 0.55em;
  color: var(--muted);
  font-weight: 400;
  line-height: 1.2;
  user-select: none;
}

/* Cards & Library views */
.cards-layout, .library-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 20px;
}
.review-panel, .deck-panel, .panel {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 16px;
}
.section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.review-card {
  min-height: 240px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  padding: 24px;
  display: grid;
  place-items: center;
  text-align: center;
}
.review-card strong { font-size: 30px; }
.deck-list, .source-list { display: grid; gap: 8px; margin-top: 12px; }
.deck-item, .source-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  background: var(--surface-2);
}
.deck-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
.deck-item p { color: var(--muted); margin-top: 2px; }
.danger { color: var(--danger); }

/* Dialog */
dialog {
  width: min(440px, calc(100vw - 32px));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
}
dialog::backdrop { background: rgba(0,0,0,0.6); }
.word-form { display: grid; gap: 14px; }
.word-form label { display: grid; gap: 6px; color: var(--muted); }
menu { display: flex; justify-content: flex-end; gap: 10px; padding: 0; }
.icon-button { width: 36px; padding: 0; }

.word-bubble {
  position: absolute;
  z-index: 100;
  width: 280px;
  padding: 20px 22px;
  border: none;
  border-radius: 18px;
  background: rgba(40, 40, 46, 0.95);
  backdrop-filter: blur(16px);
  box-shadow: 0 12px 48px rgba(0, 0, 0, 0.45);
  color: #f0ece4;
  font-size: 14px;
}
:root[data-theme="light"] .word-bubble {
  background: rgba(255, 255, 255, 0.96);
  color: #1a1a1a;
  box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
}
.bubble-word {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}
.bubble-pron {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 14px;
}
:root[data-theme="light"] .bubble-pron { color: #777; }
.bubble-meaning {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 10px;
}
.bubble-explanation {
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
  margin-bottom: 10px;
}
:root[data-theme="light"] .bubble-explanation { color: #555; }
.bubble-dict {
  margin-bottom: 10px;
}
.bubble-dict summary {
  font-size: 12px;
  color: #888;
  cursor: pointer;
  margin-bottom: 4px;
}
.bubble-defs {
  margin: 4px 0 0 0;
  padding-left: 1.6em;
  line-height: 1.4;
}
.bubble-defs li {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 2px;
}
:root[data-theme="light"] .bubble-defs li { color: #666; }
.bubble-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.1);
  color: #ddd;
  margin-bottom: 14px;
  text-transform: capitalize;
}
:root[data-theme="light"] .bubble-tag {
  background: rgba(0, 0, 0, 0.06);
  color: #555;
}
.bubble-actions {
  display: flex;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}
:root[data-theme="light"] .bubble-actions {
  border-top-color: rgba(0, 0, 0, 0.08);
}
.bubble-actions button {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  height: 34px;
  border: none;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
  color: #f0ece4;
  cursor: pointer;
}
.bubble-actions button:hover {
  background: rgba(255, 255, 255, 0.18);
}
:root[data-theme="light"] .bubble-actions button {
  background: rgba(0, 0, 0, 0.06);
  color: #1a1a1a;
}
:root[data-theme="light"] .bubble-actions button:hover {
  background: rgba(0, 0, 0, 0.1);
}

@media (max-width: 900px) {
  .workspace, .cards-layout, .library-layout { grid-template-columns: 1fr; }
}
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <h1>Learning with subtitles</h1>
      </div>

      <nav class="nav-tabs" aria-label="Main views">
        <button class="nav-tab active" data-view="study" type="button">Study</button>
        <button class="nav-tab" data-view="cards" type="button">Flashcards</button>
        <button class="nav-tab" data-view="library" type="button">Library</button>
      </nav>

      <div class="topbar-right">
        <div class="stat-pill"><strong id="subtitleCount">0</strong><span>lines</span></div>
        <div class="stat-pill"><strong id="cardCount">0</strong><span>cards</span></div>
        <div class="stat-pill"><strong id="reviewDue">0</strong><span>due</span></div>
        <button id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">☾</button>
      </div>
    </header>

    <main>
      <section id="studyView" class="view active">
        <div class="workspace">
          <section class="media-pane">
            <div id="playerShell" class="player-shell">
              <div id="playerWrap" class="player-wrap">
                <video id="video" controls playsinline></video>
                <div id="emptyPlayer" class="empty-player">
                  <span>Import a local video or load the sample lesson.</span>
                </div>
                <div id="miniDragSurface" class="mini-drag-surface"></div>
                <div id="miniDrag" class="mini-drag">
                  <span>⠿ Drag</span>
                  <button id="miniExpand" type="button" title="Back to full player" aria-label="Back to full player">⤢</button>
                </div>
                <div class="mini-rz" data-dir="n"></div>
                <div class="mini-rz" data-dir="s"></div>
                <div class="mini-rz" data-dir="e"></div>
                <div class="mini-rz" data-dir="w"></div>
                <div class="mini-rz" data-dir="nw"></div>
                <div class="mini-rz" data-dir="ne"></div>
                <div class="mini-rz" data-dir="sw"></div>
                <div class="mini-rz" data-dir="se"></div>
              </div>
            </div>
            <div class="subtitle-stage">
              <p id="activeOriginal" class="active-original">Load subtitles to begin.</p>
              <p id="activeTranslation" class="active-translation"></p>
            </div>
          </section>

          <section class="learning-pane">
            <div class="translate-bar">
              <div class="translate-langs">
                <label class="translate-field">
                  <span>From</span>
                  <select id="translateFrom" aria-label="Translate from"></select>
                </label>
                <button id="swapLangs" class="icon-button" type="button" title="Swap languages" aria-label="Swap languages">⇄</button>
                <label class="translate-field">
                  <span>To</span>
                  <select id="translateTo" aria-label="Translate to"></select>
                </label>
              </div>
              <button id="translateButton" type="button">Translate</button>
              <p id="translateStatus" class="translate-status" role="status" aria-live="polite"></p>
            </div>
            <div class="import-bar">
              <label class="file-button">Video<input id="videoInput" type="file" accept="video/*" /></label>
              <label class="file-button">Original SRT/VTT<input id="originalInput" type="file" accept=".srt,.vtt,text/vtt,text/plain" /></label>
              <label class="file-button">Translation SRT/VTT<input id="translationInput" type="file" accept=".srt,.vtt,text/vtt,text/plain" /></label>
            </div>
            <div class="url-row">
              <input id="sourceUrl" type="url" placeholder="Paste a media URL" />
              <button id="queueUrl" type="button">Import</button>
              <p id="sourceStatus" class="source-status" role="status" aria-live="polite"></p>
              <div id="progressWrap" class="progress-wrap">
                <div class="progress-bar"><div id="progressFill" class="progress-bar-fill"></div></div>
              </div>
            </div>
          </section>
        </div>
        <section class="transcript-pane">
          <div class="toolbar-row">
            <div class="search-box"><input id="searchInput" type="search" placeholder="Search transcript" /></div>
            <button id="loopLine" type="button" aria-pressed="false">Loop Line</button>
            <button id="saveLine" type="button">Save Line</button>
          </div>
          <div id="transcript" class="transcript" aria-label="Transcript"></div>
        </section>
      </section>

      <section id="cardsView" class="view">
        <div class="cards-layout">
          <section class="review-panel">
            <div class="section-title"><h2>Review</h2><button id="shuffleCards" type="button">Shuffle</button></div>
            <div id="reviewCard" class="review-card"><p>No flashcards yet.</p></div>
            <div class="card-actions">
              <button id="flipCard" type="button">Flip</button>
              <button id="markHard" type="button">Hard</button>
              <button id="markGood" type="button">Good</button>
            </div>
          </section>
          <section class="deck-panel">
            <div class="section-title"><h2>Deck</h2><button id="exportCards" type="button">Export</button></div>
            <form id="manualCardForm" class="manual-card">
              <input id="manualFront" type="text" placeholder="Word or phrase" required />
              <input id="manualBack" type="text" placeholder="Meaning" required />
              <button type="submit">Add</button>
            </form>
            <div id="deckList" class="deck-list"></div>
          </section>
        </div>
      </section>

      <section id="libraryView" class="view">
        <div class="library-layout">
          <section class="panel">
            <h2>Queued Sources</h2>
            <div id="sourceList" class="source-list"></div>
          </section>
          <section class="panel">
            <h2>Cookie Setup</h2>
            <p class="muted">YouTube may block downloads without cookies.</p>
            <div class="segmented" style="margin: 10px 0;">
              <button id="cookieModeNone" type="button" class="active">None</button>
              <button id="cookieModeBrowser" type="button">Browser</button>
              <button id="cookieModeFile" type="button">Paste</button>
            </div>
            <div id="cookieBrowserSection" style="display:none;">
              <input id="cookieBrowser" type="text" placeholder="firefox:/home/you/.config/zen/abc123.Default">
            </div>
            <div id="cookieFileSection" style="display:none;">
              <textarea id="cookiesTxt" rows="5" placeholder="# Netscape HTTP Cookie File"></textarea>
            </div>
            <button id="saveCookies" type="button" style="margin-top:10px;">Save Cookies</button>
            <p id="cookieStatus" class="muted" role="status" aria-live="polite"></p>
          </section>
        </div>
      </section>
    </main>

    <dialog id="wordDialog">
      <form method="dialog" class="word-form">
        <div class="section-title">
          <h2 id="dialogWord">Word</h2>
          <button value="cancel" class="icon-button" type="submit" aria-label="Close">×</button>
        </div>
        <label>Meaning<input id="dialogMeaning" type="text" /></label>
        <label>Example<textarea id="dialogExample" rows="3"></textarea></label>
        <menu>
          <button value="cancel" type="submit">Cancel</button>
          <button id="addWordCard" value="default" type="button">Add Flashcard</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="./js/main.mjs"></script>
  </body>
</html>
